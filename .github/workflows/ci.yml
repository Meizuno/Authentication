name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        # v7+ is required for golangci-lint v2 configs.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify formatting
        run: test -z "$(gofmt -l ./src)"

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      # Integration tests spin up Postgres via testcontainers (Docker is
      # available on GitHub-hosted runners).
      - name: Integration tests
        run: go test -tags=integration ./...
